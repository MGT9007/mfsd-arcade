<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hyperspace Garbage Collection</title>
<script>
/* ── MFSD Asset URL Rewriter ── */
(function(){
  var base = '{{ASSET_BASE}}';
  var tp   = '{{TOKEN_PARAM}}';

  /* The page URL base — used to detect absolute URLs that were resolved
     against the game page (e.g. by RequireJS or XHR). */
  var pageBase = location.href.replace(/[?#].*$/, '').replace(/\/[^\/]*$/, '') + '/';

  function rewrite(src) {
    if (!src) return src;

    /* Skip data URIs, blob URIs, already-rewritten */
    if (src.indexOf('data:') === 0 || src.indexOf('blob:') === 0 ||
        src.indexOf(base) !== -1) return src;

    /* Absolute URL resolved against our game page — extract relative path */
    if (src.indexOf('://') !== -1 || src.indexOf('//') === 0) {
      if (src.indexOf(pageBase) === 0) {
        var relativePath = src.substring(pageBase.length).replace(/[?#].*$/, '');
        if (relativePath) {
          return base + '?file=' + encodeURIComponent(relativePath) + '&token=' + tp;
        }
      }
      return src; /* truly external — leave alone */
    }

    /* Relative URL */
    return base + '?file=' + encodeURIComponent(src) + '&token=' + tp;
  }

  window.__mfsdRewrite = rewrite;

  /* Patch Audio constructor */
  var _Audio = window.Audio;
  window.Audio = function(src) { return new _Audio(rewrite(src)); };
  window.Audio.prototype = _Audio.prototype;

  /* Patch Image.src */
  var _imgDesc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
  Object.defineProperty(HTMLImageElement.prototype, 'src', {
    set: function(v) { _imgDesc.set.call(this, rewrite(v)); },
    get: function()  { return _imgDesc.get.call(this); }
  });

  /* Patch Audio/Video .src */
  var _audDesc = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, 'src');
  if (_audDesc && _audDesc.set) {
    Object.defineProperty(HTMLMediaElement.prototype, 'src', {
      set: function(v) { _audDesc.set.call(this, rewrite(v)); },
      get: function()  { return _audDesc.get.call(this); }
    });
  }

  /* Patch setAttribute — catches some dynamic loading patterns */
  var _setAttribute = Element.prototype.setAttribute;
  Element.prototype.setAttribute = function(name, value) {
    if ((name === 'src' || name === 'href') && typeof value === 'string') {
      value = rewrite(value);
    }
    return _setAttribute.call(this, name, value);
  };

  /* Patch XMLHttpRequest.open */
  var _xhrOpen = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function(method, url) {
    arguments[1] = rewrite(url);
    return _xhrOpen.apply(this, arguments);
  };

  /* Patch fetch */
  var _fetch = window.fetch;
  if (_fetch) {
    window.fetch = function(input, init) {
      if (typeof input === 'string') input = rewrite(input);
      return _fetch.call(this, input, init);
    };
  }
})();
</script>
<link rel="stylesheet" href="{{ASSET_BASE}}?file=stylesheets%2Fscreen.css&token={{TOKEN_PARAM}}">
<link rel="stylesheet" href="{{ASSET_BASE}}?file=mfsd-leaderboard.css&token={{TOKEN_PARAM}}">
<meta name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body ontouchstart="">

    <button class="material-btn" id="material-btn"></button>

    <audio id="trigger-activate-audio" src="{{ASSET_BASE}}?file=sounds%2Factivate.mp3&token={{TOKEN_PARAM}}" type="audio/mpeg" preload="auto"></audio>

    <!-- Load require.js -->
    <script src="{{ASSET_BASE}}?file=js%2Frequire.js&token={{TOKEN_PARAM}}"></script>
    <script>
    /* Override RequireJS's script loader to rewrite module URLs through
       the gated asset endpoint. require.load is the official extension
       point — it's called with the resolved absolute URL before the
       script element is created. This is more reliable than patching
       HTMLScriptElement.prototype.src which breaks the HTML parser. */
    (function() {
      var origLoad = require.load;
      require.load = function(context, moduleName, url) {
        if (window.__mfsdRewrite) {
          url = window.__mfsdRewrite(url);
        }
        return origLoad.call(this, context, moduleName, url);
      };
    })();

    requirejs.config({
        baseUrl: 'js',
        waitSeconds: 30
    });
    require(['main']);
    </script>

    <!-- Leaderboard + hook -->
    <script src="{{ASSET_BASE}}?file=mfsd-leaderboard.js&token={{TOKEN_PARAM}}"></script>
    <script src="{{ASSET_BASE}}?file=mfsd-hgc-hook.js&token={{TOKEN_PARAM}}"></script>
</body>
</html>
