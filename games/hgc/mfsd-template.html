<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MFSD Arcade — Hyperspace Garbage Collection</title>
<script>
/* ── MFSD Asset URL Rewriter ──
   Intercepts ALL relative URLs and routes them through the gated asset endpoint.
   Patches: Audio, Image, MediaElement, Script (for RequireJS dynamic loading),
   and XMLHttpRequest (for JSON level data). */
(function(){
  var base = '{{ASSET_BASE}}';
  var tp   = '{{TOKEN_PARAM}}';

  function rewrite(src) {
    if (!src) return src;
    if (src.indexOf('://') !== -1 || src.indexOf('//') === 0 ||
        src.indexOf('data:') === 0 || src.indexOf('blob:') === 0 ||
        src.indexOf(base) !== -1) return src;
    return base + '?file=' + encodeURIComponent(src) + '&token=' + tp;
  }

  /* Expose rewrite for use by other scripts */
  window.__mfsdRewrite = rewrite;

  /* Patch Audio constructor */
  var _Audio = window.Audio;
  window.Audio = function(src) { return new _Audio(rewrite(src)); };
  window.Audio.prototype = _Audio.prototype;

  /* Patch Image.src */
  var _imgDesc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
  Object.defineProperty(HTMLImageElement.prototype, 'src', {
    set: function(v) { _imgDesc.set.call(this, rewrite(v)); },
    get: function()  { return _imgDesc.get.call(this); }
  });

  /* Patch Audio/Video .src */
  var _audDesc = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, 'src');
  if (_audDesc && _audDesc.set) {
    Object.defineProperty(HTMLMediaElement.prototype, 'src', {
      set: function(v) { _audDesc.set.call(this, rewrite(v)); },
      get: function()  { return _audDesc.get.call(this); }
    });
  }

  /* Patch Script.src — critical for RequireJS which creates <script> tags dynamically */
  var _scrDesc = Object.getOwnPropertyDescriptor(HTMLScriptElement.prototype, 'src');
  if (_scrDesc && _scrDesc.set) {
    Object.defineProperty(HTMLScriptElement.prototype, 'src', {
      set: function(v) { _scrDesc.set.call(this, rewrite(v)); },
      get: function()  { return _scrDesc.get.call(this); }
    });
  }

  /* Patch XMLHttpRequest.open — for JSON level data loaded via XHR */
  var _xhrOpen = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function(method, url) {
    arguments[1] = rewrite(url);
    return _xhrOpen.apply(this, arguments);
  };

  /* Patch fetch — in case any code uses fetch for resources */
  var _fetch = window.fetch;
  if (_fetch) {
    window.fetch = function(input, init) {
      if (typeof input === 'string') {
        input = rewrite(input);
      }
      return _fetch.call(this, input, init);
    };
  }

  /* Patch Link stylesheet .href (for dynamically created stylesheets) */
  var _linkDesc = Object.getOwnPropertyDescriptor(HTMLLinkElement.prototype, 'href');
  if (_linkDesc && _linkDesc.set) {
    Object.defineProperty(HTMLLinkElement.prototype, 'href', {
      set: function(v) { _linkDesc.set.call(this, rewrite(v)); },
      get: function()  { return _linkDesc.get.call(this); }
    });
  }
})();
</script>
<link rel="stylesheet" href="{{ASSET_BASE}}?file=stylesheets%2Fapp.css&token={{TOKEN_PARAM}}">
<link rel="stylesheet" href="{{ASSET_BASE}}?file=mfsd-leaderboard.css&token={{TOKEN_PARAM}}">
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
  /* Hide the original game UI elements we don't need inside the arcade iframe */
  .editor-toggle, .fullscreen-toggle { display: none !important; }
</style>
</head>
<body>
<!-- RequireJS bootstraps the game via data-main -->
<script data-main="js/main" src="{{ASSET_BASE}}?file=js%2Frequire.js&token={{TOKEN_PARAM}}"></script>

<!-- Leaderboard + hook (loaded after RequireJS starts, hook polls for game objects) -->
<script src="{{ASSET_BASE}}?file=mfsd-leaderboard.js&token={{TOKEN_PARAM}}"></script>
<script src="{{ASSET_BASE}}?file=mfsd-hgc-hook.js&token={{TOKEN_PARAM}}"></script>
</body>
</html>
