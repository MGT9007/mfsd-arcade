<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="viewport-fit=cover, user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">
    <title>WipEout — MFSD Arcade</title>
    <link rel="stylesheet" href="{{PLUGIN_GAMES_URL}}mfsd-leaderboard.css">
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            background: #000; color: #ccc;
            font-family: monospace; font-size: 13px;
        }
        canvas {
            display: block;
            width: 100%; height: 100vh;
            object-fit: contain;
        }
        #mfsd-loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #1a0a2e; z-index: 50;
        }
        #mfsd-loading.hidden { display: none; }
        #mfsd-spinner {
            width: 48px; height: 48px; border-radius: 50%;
            border: 4px solid #222;
            border-top-color: #ffc603;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #mfsd-status { color: #aaa; margin-bottom: 8px; }
        #mfsd-progress { width: 200px; }
    </style>

    <script>
    var MFSD_PLUGIN_URL  = '{{PLUGIN_GAMES_URL}}';
    var MFSD_UPLOADS_URL = '{{WP_UPLOADS_URL}}mfsd-arcade-games/wipeout/';
    var MFSD_ASSET_BASE  = '{{ASSET_BASE}}';
    var MFSD_TOKEN_PARAM = '{{TOKEN_PARAM}}';

    function mfsdFileUrl(filename) {
        var bare = filename.split('/').pop();
        /* wipeout.data is 145MB — too large for git, served from uploads */
        if (bare === 'wipeout.data') return MFSD_UPLOADS_URL + bare;
        return MFSD_PLUGIN_URL + bare;
    }

    var statusEl   = null;
    var progressEl = null;
    var spinnerEl  = null;
    var loadingEl  = null;

    /* Module must be defined before wipeout.js is loaded */
    var Module = {
        canvas: null, /* set after DOM ready */

        /* Route WASM + data file fetches through the session-gated endpoint */
        locateFile: function (path, prefix) {
            return mfsdFileUrl(path);
        },

        /* Intercept console output for score detection */
        print: function (text) {
            console.log('[WipEout]', text);
            if (window._mfsdWipeoutPrint) window._mfsdWipeoutPrint(text);
        },

        printErr: function (text) {
            console.warn('[WipEout]', text);
        },

        setStatus: function (text) {
            if (!statusEl) return;
            if (!text) {
                /* Loading complete */
                if (loadingEl) loadingEl.classList.add('hidden');
                return;
            }
            var m = text.match(/([^(]+)\((\d+(?:\.\d+)?)\/(\d+)\)/);
            if (m) {
                statusEl.textContent = m[1].trim();
                if (progressEl) {
                    progressEl.hidden = false;
                    progressEl.value  = parseFloat(m[2]);
                    progressEl.max    = parseFloat(m[3]);
                }
            } else {
                statusEl.textContent = text;
                if (progressEl) progressEl.hidden = true;
            }
        },

        totalDependencies: 0,
        monitorRunDependencies: function (left) {
            this.totalDependencies = Math.max(this.totalDependencies, left);
            Module.setStatus(left
                ? 'Preparing… (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
                : ''
            );
        },

        preRun: [],
        postRun: [],
    };

    window.onerror = function (msg, src, line, col, err) {
        var text = 'Error: ' + (msg || err || 'unknown');
        console.error('[WipEout template]', text, src, line);
        if (statusEl) { statusEl.textContent = text; statusEl.style.color = '#f66'; }
        if (loadingEl) loadingEl.classList.remove('hidden');
        if (progressEl) progressEl.hidden = true;
    };

    /* WebGL check — runs after DOM ready, before wipeout.js */
    function checkWebGL() {
        var c = document.createElement('canvas');
        var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
        if (!gl) {
            console.error('[WipEout] WebGL not available in this context');
            if (statusEl) { statusEl.textContent = 'WebGL not available — game cannot run'; statusEl.style.color = '#f66'; }
        } else {
            console.log('[WipEout] WebGL OK:', gl.getParameter(gl.RENDERER));
        }
    }
    </script>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <div id="mfsd-loading">
        <div id="mfsd-spinner"></div>
        <div id="mfsd-status">Loading WipEout…</div>
        <progress id="mfsd-progress" value="0" max="100" hidden></progress>
    </div>

    <script>
    /* Wire up Module.canvas and loading UI elements after DOM is ready */
    Module.canvas  = document.getElementById('canvas');
    statusEl       = document.getElementById('mfsd-status');
    progressEl     = document.getElementById('mfsd-progress');
    spinnerEl      = document.getElementById('mfsd-spinner');
    loadingEl      = document.getElementById('mfsd-loading');
    checkWebGL();
    Module.setStatus('Downloading game…');
    </script>

    <!-- Game engine from plugin dir (deployed via GitHub) -->
    <script src="{{PLUGIN_GAMES_URL}}wipeout.js"></script>

    <!-- MFSD leaderboard + WipEout score hook (also direct) -->
    <script src="{{PLUGIN_GAMES_URL}}mfsd-leaderboard.js"></script>
    <script src="{{PLUGIN_GAMES_URL}}mfsd-wipeout-hook.js"></script>
</body>
</html>
